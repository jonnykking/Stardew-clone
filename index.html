<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew JS Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-ui">
        <div id="clock">Day 1 | 12:00 PM</div>
        <div id="inventory-panel">
            <div class="inv-item">Turnips: <span id="inv-turnip">0</span></div>
            <div class="inv-item">Wood: <span id="inv-wood">0</span></div>
            <div class="inv-item">Stone: <span id="inv-stone">0</span></div>
        </div>
        <div id="inventory-bar">
            <!-- Simulated tool hotbar -->
            <div class="slot active">Axe<span class="slot-num">1</span></div>
            <div class="slot">Pickaxe<span class="slot-num">2</span></div>
            <div class="slot">Hoe<span class="slot-num">3</span></div>
            <div class="slot">Seeds<span class="slot-num">4</span></div>
            <div class="slot">Can<span class="slot-num">5</span></div>
            <div class="slot">Fence<span class="slot-num">6</span></div>
            <div class="slot">Path<span class="slot-num">7</span></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>

</html>
