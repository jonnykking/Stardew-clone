<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew JS Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-ui">
        <div id="clock">Day 1 | 12:00 PM</div>
        <div id="inventory-panel">
            <div class="inv-item">Turnips: <span id="inv-turnip">0</span></div>
            <div class="inv-item">Wood: <span id="inv-wood">0</span></div>
            <div class="inv-item">Stone: <span id="inv-stone">0</span></div>
        </div>
        <div id="inventory-bar">
            <!-- Simulated tool hotbar -->
            <div class="slot active">Axe</div>
            <div class="slot">Pickaxe</div>
            <div class="slot">Hoe</div>
            <div class="slot">Seeds</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>

</html>
